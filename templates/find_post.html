<!DOCTYPE html>
<html>
<head>
    <style>
        body{
            background-image: url("{{url_for('static', filename = 'bg.png')}}");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: 100% 100%;
            color: wheat;
        }
        a{
            color: wheat;
        }
        div.container{
            display: block;
            margin: 100px ;
            padding: 10px;
            border: #333;
            border-radius: 10px ;
            background-color: #333;
        }
        div.TOP{
            background-color: #333;
            overflow: hidden;
        }
        div.TOP.a{
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 40px 20px;
            text-decoration: none;
            font-size: 17px;
        }
        img.Main_img{
            height: 20% ;
            width: 20% ;
        }
        img.Main_img:hover {
            background-color: #ddd;
            color: black;
            height: 300%;
        }
        .image{
            margin-top: 10px;
            max-width: 240px;
            max-height: 240px;
        }
        .search_box{
            float: right;
            margin-right: 16px;
        }
        .search{
            float: left;
            padding: 6px;
            border: none;
            margin-top: 6px;
            margin-right: 16px;
            font-size: 14px;
            border-radius: 10px;
        }
        .submit_button{
            float: left;
            padding: 6px;
            border: none;
            margin-top: 6px;
            margin-right: 16px;
            font-size: 14px;
            border-radius: 10px;
        }
    </style>
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename = 'prism.css')}}">
    <script src="{{url_for('static', filename = 'prism.js')}}"></script>
</head>
<body>
    <div class = "TOP">
        <a href = "{{url_for('root')}}" class = "Main_link">
            <img class = "Main_img" src="{{url_for('static', filename = 'Main_link.png')}}">
        </a>
        <form action="{{url_for('find_post')}}" method = "POST" class = "search_box">
            <input type="text" placeholder="Search.." class="search" name="search">
            <input type="submit" class="submit_button">
        </form>
    </div>
    <h1>Search items: </h1>
    <div class = "container">
        {% if indexes != [] %}
            {% for items in indexes %}
                <a href="{{url_for('show', Number = items[0])}}" class = "link"><h2>{{items[1]}}</h2></a>
            {% endfor %}
        {% else %}
            <h3>No such posts on {{search_item}}</h3>
        {% endif %}
    </div>
</body>
</html>
