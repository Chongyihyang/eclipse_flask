<!DOCTYPE html>
<html>
    <title>Login</title>
    <style>
        body{
            background-image: url("{{url_for('static', filename = 'bg.png')}}");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: 100% 100%;
        }
        a{
            color: wheat;
        }
        div.TOP{
            background-color: #333;
            overflow: hidden;
        }
        div.TOP.a{
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 40px 20px;
            text-decoration: none;
            font-size: 17px;
        }
        img.Main_img{
            height: 20% ;
            width: 20% ;
        }
        img.Main_img:hover {
            background-color: #ddd;
            color: black;
            height: 300%;
        }
        .form{
            display: block;
            text-align: center;
            margin: 30px ;
            padding-top: 10px;
            border: #333;
            border-radius: 10px ;
            background-color: #333;
        }
        form{
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
            color: white;
        }
        input.title{
            border-radius: 10px ;
        } 
        .search_box{
            float: right;
            margin-right: 16px;
        }
        .search{
            float: left;
            padding: 6px;
            border: none;
            margin-top: 6px;
            margin-right: 16px;
            font-size: 14px;
            border-radius: 10px;
        }
        .submit_button{
            float: left;
            padding: 6px;
            border: none;
            margin-top: 6px;
            margin-right: 16px;
            font-size: 14px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class = "TOP">
        <a href = "{{url_for('root')}}" class = "Main_link">
            <img class = "Main_img" src="{{url_for('static', filename = 'Main_link.png')}}">
        </a>
        <form action="{{url_for('find_post')}}" method = "POST" class = "search_box">
            <input type="text" placeholder="Search.." class="search" name="search">
            <input type="submit" class="submit_button">
        </form>
    </div>
    <div class = "form">
        <form action="{{url_for('login_success')}}" method = "POST">
            <input type="text" name="USERNAME" id="" placeholder="Username"  size="40"><br><br>
            <input type="password" name="PASSWORD" id="" size="50" placeholder="Password" size = "40"><br><br>
            <input type="submit">
        </form>          
    </div>
</body>
</html>
