<!DOCTYPE html>
<html>
    <title>Edit a post</title>
    <style>
        body{
            background-image: url("{{url_for('static', filename = 'bg.png')}}");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: 100% 100%;
        }
        a{
            color: wheat;
        }
        div.TOP{
            background-color: #333;
            overflow: hidden;
        }
        div.TOP.a{
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 40px 20px;
            text-decoration: none;
            font-size: 17px;
        }
        img.Main_img{
            height: 20% ;
            width: 20% ;
        }
        img.Main_img:hover {
            background-color: #ddd;
            color: black;
            height: 300%;
        }
        .form{
            display: block;
            text-align: center;
            margin: 30px ;
            padding-top: 10px;
            border: #333;
            border-radius: 10px ;
            background-color: #333;
        }
        form{
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
            color: white;
        }
        input.title{
            border-radius: 10px ;
        }  
        .search_box{
            float: right;
            margin-right: 16px;
        }
        .search{
            float: left;
            padding: 6px;
            border: none;
            margin-top: 6px;
            margin-right: 16px;
            font-size: 14px;
            border-radius: 10px;
        }
        .submit_button{
            float: left;
            padding: 6px;
            border: none;
            margin-top: 6px;
            margin-right: 16px;
            font-size: 14px;
            border-radius: 10px;
        } 
    </style>
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename = 'prism.css')}}">
    <script src="{{url_for('static', filename = 'prism.js')}}"></script>
    <script src="{{url_for('static', filename = 'tinymce.min.js')}}">
    </script>
    <script>
        tinymce.init({
            selector: '#myTextarea',
            plugins: 'codesample code',
            codesample_languages: [
                {text: 'HTML/XML', value: 'markup'},
                {text: 'JavaScript', value: 'javascript'},
                {text: 'CSS', value: 'css'},
                {text: 'Python', value: 'python'},
                {text: 'bash', value: 'bash' },
                {text: 'C', value: 'c'},
                {text: 'C++', value: 'cpp'}
            ],
            toolbar: 'codesample code',
            content_style: 'body { font-family:Helvetica,Arial,sans-serif; font-size:14px }'
        });
    </script>
</head>
<body>
    <div class = "TOP">
        <a href = "{{url_for('root')}}" class = "Main_link">
            <img class = "Main_img" src="{{url_for('static', filename = 'Main_link.png')}}">
        </a>
        <form action="{{url_for('find_post')}}" method = "POST" class = "search_box">
            <input type="text" placeholder="Search.." class="search" name="search">
            <input type="submit" class="submit_button">
        </form>
    </div>
    <div class = "form">
        <form action="{{url_for('edit_', Number = post_info[0][0])}}" method = "POST" enctype="multipart/form-data">
            <input type="text" name="title" id="" placeholder="Some title..." value="{{post_info[0][1]}}" size="100"><br><br>
            <textarea name="description" cols="30" rows="4" placeholder="Type some description" id="myTextarea" cols="100" rows ='50'>{{post_info[0][2]}}</textarea>
            <h3>File: <input type="file" name="file1" id="" multiple></h3>
            <input type="submit"> <a href="{{url_for('show', Number = post_info[0][0])}}">Back</a>
        </form>
    </div>
</body>
</html>
