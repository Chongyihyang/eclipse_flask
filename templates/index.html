<!DOCTYPE html>
<html>
<head>
    <title>Eclipse_CYY</title>
    <style>
        body{
            background-image: url("{{url_for('static', filename = 'bg.png')}}");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: 100% 100%;
            color: wheat;
        }
        .one_img{
            margin-top: 10px;
            max-width: 240px;
            max-height: 240px;
        }
        .two_img{
            margin-top: 10px;
            max-width: 240px;
            max-height: 240px;
        }
        .three_img{
            margin-top: 10px;
            max-width: 240px;
            max-height: 240px;
        }
        .one{
            color: #f2f2f2;
        }
        .two{
            color: #2596be;
        }
        .three{
            color: red;
        }
        div.container {
            display: flex;                  /* establish flex container */
            flex-direction: row;            /* default value; can be omitted */
            flex-wrap: nowrap;              /* default value; can be omitted */
            justify-content: space-between; /* switched from default (flex-start, see below) */
            margin-top: 200px;
            margin-left: 20px;
            margin-right: 20px;
            text-align: center;
            }
        div.container > div {
            width: 300px;
            height: 300px;
            border: 2px #333;
            background-color: #333;
            border-radius: 10px;
            }
        div.TOP{
            background-color: #333;
            overflow: hidden;
        }
        div.TOP.a{
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 40px 20px;
            text-decoration: none;
            font-size: 17px;
        }
        img.Main_img{
            height: 20% ;
            width: 20% ;
        }
        img.Main_img:hover {
            background-color: #ddd;
            color: black;
            height: 300%;
        }
        .search_box{
            float: right;
            margin-right: 16px;
        }
        .search{
            float: left;
            padding: 6px;
            border: none;
            margin-top: 6px;
            margin-right: 16px;
            font-size: 14px;
            border-radius: 10px;
        }
        .submit_button{
            float: left;
            padding: 6px;
            border: none;
            margin-top: 6px;
            margin-right: 16px;
            font-size: 14px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class = "TOP">
        <a href = "{{url_for('root')}}" class = "Main_link">
            <img class = "Main_img" src="{{url_for('static', filename = 'Main_link.png')}}">
        </a>
        <form action="{{url_for('find_post')}}" method = "POST" class = "search_box">
            <input type="text" placeholder="Search.." class="search" name="search">
            <input type="submit" class="submit_button">
        </form>
    </div>
    <div class="container">
        <div id="st-box">
            {% if post1 != None %}
            <a href="{{url_for('show', Number = post1[0])}}" class = "one">
            <p>{{post1[1]}}</p><br><img class = "one_img" src="{{url_for('static', filename = post1[6])}}"></a>
            {% else %}
            No posts as of now
            {% endif %}
        </div>  
        <div id="nd-box">
            {% if post2 != None %}
            <a href="{{url_for('show', Number = post2[0])}}" class = "two">
            <p>{{post2[1]}}</p><br><img class = "two_img" src="{{url_for('static', filename = post2[6])}}"></a>
            {% else %}
            No posts as of now
            {% endif %}
        </div>
        <div id="rd-box">
            {% if post3 != None %}
            <a href="{{url_for('show', Number = post3[0])}}" class = "three">
            <p>{{post3[1]}}</p><br><img class = "three_img" src="{{url_for('static', filename = post3[6])}}"></a>
            {% else %}
            No posts as of now
            {% endif %}
        </div>
    </div>
</body>
</html>
